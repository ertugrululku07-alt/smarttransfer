name: Otomatik Deploy (GoDaddy)

on:
  push:
    branches:
      - main # veya 'master' - Hangi branch'e kod gönderdiğinizde çalışacağını belirtir

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Sunucuya bağlan ve güncelle
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          # Eğer şifre yerine SSH anahtarı kullanıyorsanız üstteki password satırını silip alttakini açın:
          # key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            # 1. aaPanel projenin kurulu olduğu dizine git
            cd /www/wwwroot/jet2home.com
            
            # 2. GitHub'dan en güncel kodları çek
            git pull origin main
            
            # 3. Otomatik kurulum betiğini çalıştır (Bağımlılıklar, build vs.)
            node setup.js
            
            # 4. PM2 ile çalışan uygulamaları yeniden başlat
            pm2 restart all
