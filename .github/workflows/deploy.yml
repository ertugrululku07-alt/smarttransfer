name: Otomatik Deploy (GoDaddy)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Sunucuya bağlan ve güncelle
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          command_timeout: 10m
          script: |
            echo "${{ secrets.SERVER_PASSWORD }}" | sudo -S sh -c '
              export PATH=$PATH:/usr/local/bin:/www/server/nodejs/v18/bin:/www/server/nodejs/v20/bin:/www/server/pgsql/bin:/usr/pgsql-14/bin:/usr/pgsql-15/bin
              cd /www/wwwroot/jet2home.com
              
              git config --global --add safe.directory /www/wwwroot/jet2home.com
              
              if [ ! -d ".git" ]; then
                git init
              fi
              
              git remote add origin https://github.com/ertugrululku07-alt/smarttransfer.git 2>/dev/null || true
              git fetch origin
              git reset --hard origin/main

              # ── 1. Eski build cache ve env.local komple temizle ──
              rm -f frontend/.env.local
              rm -rf frontend/.next
              rm -rf frontend/node_modules/.cache
              echo "STEP 1 OK: Cache temizlendi"

              # ── 2. Backend bagimliliklar ve Prisma ──
              cd backend
              npm install --production 2>/dev/null || true
              npx prisma generate 2>/dev/null || true
              npx prisma db push 2>/dev/null || true
              cd ..
              echo "STEP 2 OK: Backend hazir"

              # ── 3. Frontend: env.production olustur ──
              printf "NEXT_PUBLIC_API_URL=https://api.jet2home.com\nNEXT_PUBLIC_SOCKET_URL=https://api.jet2home.com\nNEXT_PUBLIC_TENANT_SLUG=Jet2Home\nNEXT_PUBLIC_HERE_API_KEY=RH04HVBUK6By3GfYWwVlCOG4Or1IzV-rRjygQRHbIvo\n" > frontend/.env.production
              cat frontend/.env.production
              echo "STEP 3 OK: env.production yazildi"

              # ── 4. Frontend bagimliliklar (devDependencies dahil) ──
              cd frontend
              npm install 2>&1 | tail -3
              echo "STEP 4 OK: npm install tamamlandi"
              
              # ── 5. Frontend Build ──
              npx next build 2>&1 | tail -20
              BUILD_EXIT=$?
              echo "STEP 5: Build exit code = $BUILD_EXIT"
              
              if [ $BUILD_EXIT -ne 0 ]; then
                echo "BUILD BASARISIZ! Cikiliyor."
                exit 1
              fi
              
              echo "STEP 5 OK: Build tamamlandi"
              ls -la .next/BUILD_ID 2>/dev/null
              cat .next/BUILD_ID 2>/dev/null
              cd ..

              # ── 6. PM2 stop+delete+start (clean restart, in-memory cache temizlenir) ──
              npx pm2 stop all 2>/dev/null || true
              npx pm2 delete all 2>/dev/null || true
              
              # Nginx cache - TUM olasi konumlari temizle (aaPanel/BT Panel)
              rm -rf /tmp/nginx_cache 2>/dev/null || true
              rm -rf /tmp/nginx_proxy_cache 2>/dev/null || true
              rm -rf /dev/shm/nginx_cache 2>/dev/null || true
              rm -rf /www/wwwroot/.cache 2>/dev/null || true
              rm -rf /www/server/nginx/proxy_cache_dir 2>/dev/null || true
              find /tmp -name "nginx*" -type d -exec rm -rf {} + 2>/dev/null || true
              find /dev/shm -name "nginx*" -type d -exec rm -rf {} + 2>/dev/null || true
              # aaPanel proxy cache
              find /www -path "*/proxy_cache*" -type d -exec rm -rf {} + 2>/dev/null || true
              
              # Nginx tamamen yeniden baslat (reload degil, restart)
              nginx -s stop 2>/dev/null || true
              sleep 1
              nginx 2>/dev/null || true
              echo "Nginx restarted"
              
              # PM2 yeniden baslat (ecosystem.config.js ile)
              cd /www/wwwroot/jet2home.com
              npx pm2 start ecosystem.config.js
              npx pm2 save
              echo "STEP 6 OK: PM2 clean start tamamlandi"
              echo "=== DEPLOY TAMAMLANDI ==="
            '
