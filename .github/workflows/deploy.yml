name: Otomatik Deploy (GoDaddy)

on:
  push:
    branches:
      - main # veya 'master' - Hangi branch'e kod gönderdiğinizde çalışacağını belirtir

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Sunucuya bağlan ve güncelle
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          # Eğer şifre yerine SSH anahtarı kullanıyorsanız üstteki password satırını silip alttakini açın:
          # key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            # Güvenlik nedeniyle root girişi kapalı olduğu için, smarttech üzerinden sudo ile root yetkisi alıyoruz
            echo "${{ secrets.SERVER_PASSWORD }}" | sudo -S sh -c '
              export PATH=$PATH:/usr/local/bin:/www/server/nodejs/v18/bin:/www/server/nodejs/v20/bin:/www/server/pgsql/bin:/usr/pgsql-14/bin:/usr/pgsql-15/bin
              cd /www/wwwroot/jet2home.com
              
              # Git güvenlik uyarısını aşmak için klasörü güvenli dizin olarak ekliyoruz
              git config --global --add safe.directory /www/wwwroot/jet2home.com
              
              if [ ! -d ".git" ]; then
                git init
              fi
              
              # Remote ayarını garantilemek ve değişiklikleri zorla (force) eşitlemek için:
              git remote add origin https://github.com/ertugrululku07-alt/smarttransfer.git 2>/dev/null || true
              git fetch origin
              git reset --hard origin/main
              
              echo "E" | node setup.js
              
              # --- GEÇİCİ VERİTABANI AKTARIM VE TÜRKÇE KARAKTER DÜZELTME SCRİPTİ ---
              echo "Railway den UTF-8 formatinda veritabani yedegi cekiliyor..."
              export PGCLIENTENCODING=UTF8
              pg_dump --clean --if-exists --no-owner --no-privileges --dbname="postgresql://postgres:MziCNdjmUdEeOhhJanQRZCtbhmnDxRto@crossover.proxy.rlwy.net:58887/railway" -f /tmp/railway_dump.sql
              
              echo "GoDaddy veritabanina Turkce karakterler korunarak yukleniyor..."
              psql "postgresql://jet2home:A05116454a@127.0.0.1:5432/jet2home_db?sslmode=disable" < /tmp/railway_dump.sql
              
              echo "Giris yapabilmeniz icin Tenant sirket adi Jet2Home olarak guncelleniyor..."
              echo "UPDATE \"Tenant\" SET slug = '\''Jet2Home'\'';" | psql "postgresql://jet2home:A05116454a@127.0.0.1:5432/jet2home_db?sslmode=disable"
              # ---------------------------------------------------------------------
              
              npx pm2 restart all
            '
