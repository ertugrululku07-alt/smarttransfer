name: Otomatik Deploy (GoDaddy)

on:
  push:
    branches:
      - main # veya 'master' - Hangi branch'e kod gönderdiğinizde çalışacağını belirtir

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Sunucuya bağlan ve güncelle
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          # Eğer şifre yerine SSH anahtarı kullanıyorsanız üstteki password satırını silip alttakini açın:
          # key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            # Ortam değişkenlerini (Node ve PM2) yükle
            source ~/.bash_profile || true
            source ~/.bashrc || true
            export PATH=$PATH:/usr/local/bin:/www/server/nodejs/v18/bin:/www/server/nodejs/v20/bin
            
            # 1. aaPanel projenin kurulu olduğu dizine git
            cd /www/wwwroot/jet2home.com
            
            # 2. Eğer klasörde .git yoksa (ilk defa çekiyorsa) tanımla, varsa sadece pull yap
            if [ ! -d ".git" ]; then
              git init
              git remote add origin https://github.com/ertugrululku07-alt/smarttransfer.git
              git fetch
              git reset --hard origin/main
            else
              git pull origin main
            fi
            
            # 3. Otomatik kurulum betiğini çalıştır
            # Onay sorusuna otomatik "E" (Evet) cevabı gönderiyoruz
            echo "E" | node setup.js
            
            # 4. PM2 ile çalışan uygulamaları yeniden başlat (npx ile garantiye alıyoruz)
            npx pm2 restart all
